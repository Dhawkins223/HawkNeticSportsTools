name: hawknetic-local

services:
  postgres:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB in .env}
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_TEST_DB: ${POSTGRES_TEST_DB:?set POSTGRES_TEST_DB in .env}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:?set POSTGRES_PORT in .env}:5432"
    volumes:
      - hawknetic_postgres_data:/var/lib/postgresql
      - ./docker/postgres/init/01-create-test-database.sh:/docker-entrypoint-initdb.d/01-create-test-database.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  hawknetic_postgres_data:
