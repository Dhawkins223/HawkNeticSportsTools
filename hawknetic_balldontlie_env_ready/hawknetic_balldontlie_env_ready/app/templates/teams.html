{% extends 'base.html' %}
{% block title %}Teams | HawkNeticSportsTools{% endblock %}
{% block content %}<section class="section"><div class="container"><h1>Teams</h1><div class="feature-grid">{% for t in teams %}<article class="card"><h3><a href="/teams/{{ t['id'] }}">{{ t['full_name'] }}</a></h3><p>{{ t['abbreviation'] }} · {{ t['conference'] or 'Conference TBD' }}</p></article>{% else %}<article class="card"><p class="muted">No canonical teams loaded yet.</p></article>{% endfor %}</div></div></section>{% endblock %}
