[phases.setup]
nixPkgs = ["python311"]

[phases.install]
cmds = ["python -m pip install .", "python -m compileall src"]

[start]
cmd = "KALSHI_HTTP_CACHE_TTL_SECONDS=900 KALSHI_HTTP_MAX_RETRIES=2 KALSHI_HTTP_BACKOFF_SECONDS=2 KALSHI_HTTP_MIN_INTERVAL_SECONDS=0.25 KALSHI_HTTP_ALLOW_STALE_ON_ERROR=false KALSHI_HTTP_MAX_STALE_SECONDS=7200 PYTHONPATH=src python -m kalshi_research_bot paper --host 0.0.0.0 --port ${PORT:-8000} --refresh-seconds 900"
